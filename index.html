<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SunStar Davao Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Roboto+Slab:wght@700;800;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            colors: {
              sun: {
                cream: "#fff7bf",
                yellow: "#f4d000",
                yellowSoft: "#ffe15a",
                yellowDeep: "#e0b700",
                ink: "#101010"
              }
            },
            fontFamily: {
              logo: ["Alfa Slab One", "serif"],
              davao: ["Roboto Slab", "serif"],
              body: ["Source Sans 3", "sans-serif"]
            }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-sun-yellow font-body text-sun-ink">
  <main class="mx-auto flex min-h-screen w-full max-w-6xl items-center justify-center px-5 py-10">
    <section class="w-full max-w-5xl overflow-hidden rounded-3xl border border-[#0000002e] bg-white shadow-[0_28px_80px_-36px_rgba(0,0,0,0.45)]">
      <div class="grid md:grid-cols-[0.92fr_1.08fr]">
        <aside
          class="relative min-h-[360px] bg-cover bg-center bg-no-repeat"
          style="background-image: url('assets/portal-cover.png');"
        >
          <div class="absolute inset-0 bg-black/5"></div>
        </aside>

        <div class="bg-white p-6 sm:p-8 md:p-11">
          <p class="inline-flex rounded-full border border-zinc-200 bg-white px-3 py-1 text-xs font-semibold uppercase tracking-[0.16em] text-zinc-700">Sign In</p>
          <h1 class="mt-4 text-3xl font-bold tracking-tight text-zinc-900">Welcome Back</h1>
          <p class="mt-2 text-sm text-zinc-600">Use your email and password to access your SunStar Davao account.</p>

          <form id="loginForm" class="mt-7 space-y-5" novalidate>
            <div>
              <label for="email" class="mb-1.5 block text-sm font-semibold text-zinc-800">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                placeholder="you@example.com"
                autocomplete="email"
                class="w-full rounded-xl border border-[#00000033] bg-white px-4 py-3 text-sm outline-none transition focus:border-zinc-800 focus:ring-4 focus:ring-zinc-200"
                required
              />
            </div>

            <div>
              <label for="password" class="mb-1.5 block text-sm font-semibold text-zinc-800">Password</label>
              <div class="relative">
                <input
                  id="password"
                  name="password"
                  type="password"
                  placeholder="Enter password"
                  autocomplete="current-password"
                  minlength="6"
                  class="w-full rounded-xl border border-[#00000033] bg-white px-4 py-3 pr-16 text-sm outline-none transition focus:border-zinc-800 focus:ring-4 focus:ring-zinc-200"
                  required
                />
                <button
                  id="togglePassword"
                  type="button"
                  class="absolute right-2 top-1/2 -translate-y-1/2 rounded-md px-2 py-1 text-xs font-semibold text-zinc-700 hover:bg-zinc-100"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>

            <div class="flex items-center justify-between text-sm">
              <label class="inline-flex items-center gap-2 text-zinc-600">
                <input type="checkbox" class="h-4 w-4 rounded border-zinc-300 text-zinc-900 focus:ring-zinc-300" />
                Remember me
              </label>
              <a href="#" class="font-semibold text-zinc-700 hover:text-zinc-900">Forgot password?</a>
            </div>

            <button
              type="submit"
              class="w-full rounded-xl border border-sun-yellow bg-sun-yellow px-4 py-3 text-sm font-bold text-zinc-900 transition hover:bg-sun-yellowLight hover:shadow-lg active:scale-[0.98]"
            >
              Log In
            </button>

            <p id="statusMessage" class="hidden rounded-lg border px-3 py-2 text-sm"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="backend-database/supabase-config.js"></script>
  <script src="backend-database/supabase-client.js"></script>
  <script src="backend-database/supabase-admin-service.js"></script>
  <script src="backend-database/supabase-employee-service.js"></script>

  <script>
    const SESSION_USER_KEY = 'sunstar_logged_in_user_id';
    const SESSION_ROLE_KEY = 'sunstar_logged_in_role';
    const SESSION_ADMIN_EMAIL_KEY = 'sunstar_logged_in_admin_email';

    // Visiting the login page resets any active session.
    localStorage.removeItem(SESSION_USER_KEY);
    localStorage.removeItem(SESSION_ROLE_KEY);
    localStorage.removeItem(SESSION_ADMIN_EMAIL_KEY);

    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const togglePasswordBtn = document.getElementById("togglePassword");
    const statusMessage = document.getElementById("statusMessage");

    togglePasswordBtn.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      togglePasswordBtn.textContent = isHidden ? "Hide" : "Show";
      togglePasswordBtn.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password || password.length < 6) {
        statusMessage.className = "rounded-lg border border-red-300 bg-red-50 px-3 py-2 text-sm text-red-700";
        statusMessage.textContent = "Please enter a valid email and a password with at least 6 characters.";
        return;
      }

      let redirectUrl = "";

      const adminAccount = window.AdminDataService
        ? await window.AdminDataService.authenticateAdmin(email, password)
        : null;

      if (adminAccount) {
        localStorage.removeItem(SESSION_USER_KEY);
        localStorage.setItem(SESSION_ROLE_KEY, 'admin');
        localStorage.setItem(SESSION_ADMIN_EMAIL_KEY, String(adminAccount.email || '').toLowerCase());
        redirectUrl = 'admin/admin-dashboard.html';
      } else {
        let matchedEmployee = null;

        if (window.EmployeeDataService) {
          matchedEmployee = await window.EmployeeDataService.authenticateEmployee(email, password);
          if (matchedEmployee) {
            await window.EmployeeDataService.syncLocalFromRemote();
          }
        }

        if (!matchedEmployee) {
          const employees = JSON.parse(localStorage.getItem('sunstar_employees')) || [];
          matchedEmployee = employees.find(emp => (emp.email || '').toLowerCase() === email.toLowerCase());
          if (matchedEmployee && String(matchedEmployee.password || '') !== password) {
            matchedEmployee = null;
          }
        }

        if (!matchedEmployee) {
          statusMessage.className = "rounded-lg border border-red-300 bg-red-50 px-3 py-2 text-sm text-red-700";
          statusMessage.textContent = "Invalid employee email or password.";
          return;
        }

        if (matchedEmployee.id !== undefined && matchedEmployee.id !== null) {
          localStorage.setItem(SESSION_USER_KEY, String(matchedEmployee.id));
        }
        localStorage.setItem(SESSION_ROLE_KEY, 'employee');
        localStorage.removeItem(SESSION_ADMIN_EMAIL_KEY);

        redirectUrl = 'employee/employee_dashboard.html';
      }

      statusMessage.className = "rounded-lg border border-emerald-300 bg-emerald-50 px-3 py-2 text-sm text-emerald-700";
      statusMessage.textContent = "Login successful! Redirecting...";

      setTimeout(() => {
        window.location.href = redirectUrl;
      }, 800);
    });
  </script>
</body>
</html>
